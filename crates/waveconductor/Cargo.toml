[package]
name = "waveconductor"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "WaveConductor v5 — Rust + Bevy interactive art gallery."
publish = false
build = "build.rs"

[[bin]]
name = "waveconductor"
path = "src/main.rs"

[lints]
workspace = true

[features]
default = ["hand-tracking-gestures"]
# Propagates to wc-core and wc-sketches; always on for the waveconductor binary.
# Declared here so that examples (e.g. leap_smoke) can gate on this feature name
# without triggering `unexpected_cfg` warnings.
hand-tracking-gestures = [
    "dep:leaprs",
    "wc-core/hand-tracking-gestures",
    "wc-sketches/hand-tracking-gestures",
]

[dependencies]
bevy = { workspace = true }
bevy_egui = { workspace = true }
# `thermal-sensor` gives the deployment binary real OS temperature readings.
# On the Linux NUC this reads the hottest hardware component via `sysinfo`; on
# the macOS dev box it falls through to the Cool/Schedule no-sensor model (the
# Apple-Silicon `macmon` backend is behind the dormant `thermal-sensor-macos`
# feature, not enabled here, so this stays buildable on macOS).
wc-core = { workspace = true, features = ["thermal-sensor"] }
wc-sketches = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
# Optional: pulled in when the `hand-tracking-gestures` feature is active.
# Waveconductor is native-only so no wasm target table needed here.
leaprs = { workspace = true, optional = true }
