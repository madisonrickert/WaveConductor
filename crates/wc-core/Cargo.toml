[package]
name = "wc-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "WaveConductor shared infrastructure: lifecycle, audio, input, settings, math."
publish = false

[lints]
workspace = true

[features]
default = []
# Enables HandTrackingState consumers (sketch gesture detection) and brings
# in the native LeapC FFI dependency. The waveconductor binary turns this on;
# tests can opt in selectively.
hand-tracking-gestures = ["dep:leaprs"]

[dependencies]
bevy = { workspace = true }
cpal = { workspace = true }
fundsp = { workspace = true }
leafwing-input-manager = { workspace = true }
rtrb = { workspace = true }
rustfft = { workspace = true }
smallvec = { workspace = true }
symphonia = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
wc-core-macros.workspace = true
bevy_egui.workspace = true
bevy-inspector-egui.workspace = true
egui-phosphor = { workspace = true }
serde.workspace = true
toml.workspace = true
dirs.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = { workspace = true }
leaprs = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys.workspace = true
serde_json.workspace = true

[dev-dependencies]
tempfile.workspace = true
