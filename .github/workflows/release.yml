name: Promote Alpha

# One manual workflow validates, builds, tags, and publishes a v5 alpha.
#
# Run it from the Actions UI with:
# - `version`: the new tag, e.g. `v5.0.0-alpha.4`
# - `target_ref`: the branch or SHA to promote, usually `v5-alpha`
# - `publish`: `true` to create the annotated tag and GitHub pre-release after
#   all validation and artifact builds pass; `false` to run the same checks as a
#   dry run without creating any release state.
#
# This replaces the old "dry-run release, push tag, rebuild everything" flow.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Alpha tag to create, e.g. v5.0.0-alpha.4"
        required: true
        type: string
      target_ref:
        description: "Branch, tag, or commit SHA to promote"
        required: true
        default: v5-alpha
        type: string
      publish:
        description: "Create the annotated tag and GitHub pre-release after success"
        required: true
        default: false
        type: boolean

run-name: ${{ inputs.version }} from ${{ inputs.target_ref }}

concurrency:
  group: promote-alpha-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  prepare:
    name: prepare candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      target_sha: ${{ steps.prepare.outputs.target_sha }}
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Validate promote inputs
        id: prepare
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "::error title=Invalid version::Expected a tag like v5.0.0-alpha.4, got '$VERSION'."
            exit 1
          fi

          target_sha="$(git rev-parse HEAD)"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice title=Promote target::$VERSION will use $target_sha."

          if [[ "$PUBLISH" == "true" ]] && git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error title=Tag already exists::$VERSION already exists on origin."
            exit 1
          fi

          if [[ "$PUBLISH" != "true" ]]; then
            echo "::notice title=Dry run::publish=false, so this run will validate and build only."
          fi

  fmt:
    name: rustfmt
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  check-secrets:
    name: check-secrets
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask check-secrets

  validate-shaders:
    name: validate-shaders
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask validate-shaders

  deny:
    name: cargo-deny
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --workspace --all-features

  test-linux:
    name: test (ubuntu-latest)
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
      LEAPSDK_LIB_PATH: ${{ github.workspace }}/vendor/leapc/linux-x86_64
      LD_LIBRARY_PATH: ${{ github.workspace }}/vendor/leapc/linux-x86_64
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: rui314/setup-mold@v1
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - name: Provide unversioned LeapC soname
        run: ln -sf libLeapC.so.6 vendor/leapc/linux-x86_64/libLeapC.so
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  test-cross-platform:
    name: test (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            leap: macos-aarch64
          - os: windows-latest
            leap: windows-x86_64
    env:
      RUSTFLAGS: "-D warnings"
      LEAPSDK_LIB_PATH: ${{ github.workspace }}/vendor/leapc/${{ matrix.leap }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Leap runtime lib path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "DYLD_FALLBACK_LIBRARY_PATH=$GITHUB_WORKSPACE/vendor/leapc/${{ matrix.leap }}" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            echo "$GITHUB_WORKSPACE/vendor/leapc/${{ matrix.leap }}" >> "$GITHUB_PATH"
          fi
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  doc:
    name: doc
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - run: cargo doc --no-deps --workspace --document-private-items
      - run: cargo test --doc --workspace

  build:
    name: build (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle: bundle-mac
            leap: macos-aarch64
            app_path: target/WaveConductor.app
            asset: WaveConductor-macos-arm64.zip
          - os: windows-latest
            bundle: bundle-windows
            leap: windows-x86_64
            app_path: target/dist/windows-x86_64/WaveConductor
            asset: WaveConductor-windows-x86_64.zip
          - os: ubuntu-latest
            bundle: bundle-linux
            leap: linux-x86_64
            app_path: target/dist/linux-x86_64/WaveConductor
            asset: WaveConductor-linux-x86_64.tar.gz
    env:
      LEAPSDK_LIB_PATH: ${{ github.workspace }}/vendor/leapc/${{ matrix.leap }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build deps for Bevy
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'

      - name: Provide unversioned LeapC soname (Linux link)
        if: runner.os == 'Linux'
        run: ln -sf libLeapC.so.6 vendor/leapc/linux-x86_64/libLeapC.so

      - name: Build + bundle
        run: cargo xtask ${{ matrix.bundle }}

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "${{ matrix.app_path }}" "${{ matrix.asset }}"

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: tar czf "${{ matrix.asset }}" -C target/dist/linux-x86_64 WaveConductor

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.app_path }}" -DestinationPath "${{ matrix.asset }}" -Force

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish pre-release
    needs:
      - prepare
      - fmt
      - clippy
      - check-secrets
      - validate-shaders
      - deny
      - test-linux
      - test-cross-platform
      - doc
      - build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify release notes
        run: test -s .github/release-notes/v5-alpha.md

      - name: Create annotated tag
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        run: |
          set -euo pipefail
          git -c user.name=github-actions[bot] \
            -c user.email=41898282+github-actions[bot]@users.noreply.github.com \
            tag -a "$VERSION" "$TARGET_SHA" -m "WaveConductor $VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: >
          gh release create "$VERSION"
          --repo "${{ github.repository }}"
          --verify-tag
          --title "WaveConductor $VERSION"
          --notes-file .github/release-notes/v5-alpha.md
          --prerelease
          dist/*
