name: CI

on:
  push:
    branches: [main, v5-alpha]
  pull_request:
    branches: [main, v5-alpha]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Disable incremental compilation in CI: each run is one-shot, so the
  # incremental metadata is dead weight that also bloats rust-cache.
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  check-secrets:
    name: check-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask check-secrets

  validate-shaders:
    name: validate-shaders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      # No Bevy build deps needed: xtask depends only on naga + CLI crates, not
      # the app's alsa/udev/wayland stack (same as the check-secrets job).
      - run: cargo xtask validate-shaders

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --workspace --all-features

  # (The separate `cargo-audit` job was retired 2026-07-02: it read the same
  # RustSec DB as `cargo deny check` above but did NOT honor deny.toml's ignore
  # list, so a transitively-forced-but-not-exploitable advisory had to be
  # ignored in two places. `deny` is now the single advisory gate. See
  # docs/runbooks/ci-cost-review.md.)

  # Linux tests run on every push/PR for fast feedback.
  test-linux:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    # leaprs links LeapC; point at the Linux vendor tree (the .cargo/config.toml
    # default is the macOS path). Absolute so the linker resolves it regardless
    # of the build's working directory. LD_LIBRARY_PATH covers runtime: CI sets
    # RUSTFLAGS=-D warnings, which overrides the per-target rpath rustflags in
    # .cargo/config.toml, so the test binary has no baked Leap rpath and would
    # otherwise fail to load libLeapC.so.6 (exit 127) when nextest lists tests.
    env:
      LEAPSDK_LIB_PATH: ${{ github.workspace }}/vendor/leapc/linux-x86_64
      LD_LIBRARY_PATH: ${{ github.workspace }}/vendor/leapc/linux-x86_64
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      # mold linker: drop-in replacement for ld that's 3-10x faster on Bevy's
      # dep tree. Linux-only; macOS uses ld64 and Windows uses link.exe.
      - uses: rui314/setup-mold@v1
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      # The vendored tree ships libLeapC.so.6 but `-lLeapC` needs an unversioned
      # libLeapC.so at link time (macOS vendors its alias; Windows links LeapC.lib).
      - name: Provide unversioned LeapC soname
        run: ln -sf libLeapC.so.6 vendor/leapc/linux-x86_64/libLeapC.so
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  # Cross-platform tests run on main pushes. PR and v5-alpha feedback comes from
  # Linux; the Promote Alpha workflow runs macOS/Windows tests before it tags and
  # publishes an alpha.
  test-cross-platform:
    name: test (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to macos-15 (Sequoia, Xcode 16.x): macos-latest advanced to the
          # macOS 26 image whose Xcode 26.5 clang resource dir is broken
          # (`ld: library 'clang_rt.osx' not found`). Sequoia keeps arm64.
          - os: macos-15
            leap: macos-aarch64
          - os: windows-latest
            leap: windows-x86_64
    # leaprs links LeapC; override the .cargo/config.toml macOS default per runner
    # (macos-latest is arm64; windows needs the LeapC.lib import library).
    env:
      LEAPSDK_LIB_PATH: ${{ github.workspace }}/vendor/leapc/${{ matrix.leap }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Select working Xcode (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app
          # The runner image's default Xcode 26.5 ships a broken clang resource
          # dir (missing lib/darwin), so rustc's `-lclang_rt.osx` fails to link.
          # Select the newest Xcode 16.x, which has a complete toolchain.
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XC" ]; then echo "::error::no Xcode 16.x found on this runner"; exit 1; fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcrun clang --version
      # RUSTFLAGS=-D warnings drops the config rpath (see test-linux); point the
      # runtime loader at the vendored Leap lib per OS so the test binary loads.
      - name: Leap runtime lib path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "DYLD_FALLBACK_LIBRARY_PATH=$GITHUB_WORKSPACE/vendor/leapc/${{ matrix.leap }}" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            echo "$GITHUB_WORKSPACE/vendor/leapc/${{ matrix.leap }}" >> "$GITHUB_PATH"
          fi
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - run: cargo doc --no-deps --workspace --document-private-items
      - run: cargo test --doc --workspace
