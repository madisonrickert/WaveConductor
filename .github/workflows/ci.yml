name: CI

on:
  push:
    branches: [main, v5-alpha]
    tags: ["v*"]
  pull_request:
    branches: [main, v5-alpha]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Disable incremental compilation in CI: each run is one-shot, so the
  # incremental metadata is dead weight that also bloats rust-cache.
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  check-secrets:
    name: check-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask check-secrets

  validate-shaders:
    name: validate-shaders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      # No Bevy build deps needed: xtask depends only on naga + CLI crates, not
      # the app's alsa/udev/wayland stack (same as the check-secrets job).
      - run: cargo xtask validate-shaders

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --workspace --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Linux tests run on every push/PR for fast feedback.
  test-linux:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      # mold linker: drop-in replacement for ld that's 3-10x faster on Bevy's
      # dep tree. Linux-only; macOS uses ld64 and Windows uses link.exe.
      - uses: rui314/setup-mold@v1
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  # Cross-platform tests run only on main pushes and release tags. PR feedback
  # comes from Linux; macOS/Windows catch portability regressions before release.
  test-cross-platform:
    name: test (${{ matrix.os }})
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build deps for Bevy
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev
      - run: cargo doc --no-deps --workspace --document-private-items
