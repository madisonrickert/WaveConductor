[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
ignore = [
    # `paste` (used transitively by Bevy via wgpu → wgpu-hal → metal) was archived
    # by its author. No safe upgrade available; the entire wgpu/Bevy stack will
    # need to migrate. Tracked widely across the Bevy ecosystem. Re-evaluate
    # when wgpu or metal drop the dependency.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    # Font licenses for egui's default bundled fonts (epaint_default_fonts).
    # Both are FSF-free; OFL is OSI-approved. We don't redistribute the fonts
    # standalone — they ship as data inside the binary, which both licenses permit.
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
