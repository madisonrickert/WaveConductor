[alias]
xtask = "run --quiet --package xtask --"
# Dev-only fast iteration: `cargo rund` runs the binary with Bevy linked as a
# shared library (`libbevy_dylib`), which turns the slow full relink of Bevy's
# dep tree into a small incremental link. Drop-in for `cargo run -p
# waveconductor`; trailing args append (`cargo rund -- --flag`). The built
# binary is NOT self-contained — it dynamically links libstd and libbevy_dylib,
# whose search paths `cargo run` injects — so always launch via `cargo rund`,
# never the bare `target/debug/waveconductor`.
#
# MUST stay dev-only. `bevy/dynamic_linking` is incompatible with the release
# profile's `lto = "fat"` + `strip`, and WASM has no dylib. It is passed here
# as a CLI feature, NEVER declared in a crate `[features]` table — a forwarding
# feature would be switched on by CI's `cargo {clippy,nextest,deny,doc}
# --all-features`, leaking dynamic linking into CI/release. The alias keeps it
# scoped to explicit local invocation only. Layers on top of the per-target
# rpath rustflags below (libbevy_dylib resolves via Cargo, libLeapC via the
# `@executable_path`/`$ORIGIN` rpaths). CF #85.
rund = "run --package waveconductor --features bevy/dynamic_linking"

[build]
# Parallel frontend (rustc -Z threads=...) is nightly-only. Uncomment only when
# building with a nightly override.
# rustflags = ["-Z", "threads=8"]

# Vendored LeapC SDK — see vendor/leapc/README.md for layout.
#
# `LEAPSDK_LIB_PATH` is read by `leaprs`'s build.rs (NOT `leap-sys`, which only
# generates FFI bindings and does no linking — the link directive `-lLeapC`
# lives in leaprs/build.rs at all crate versions ≥ 0.2.0). leaprs's default
# fallback on macOS is `/Applications/Ultraleap Hand Tracking.app/...`, which
# works for local dev but not for cloud CI builders that don't have Ultraleap
# installed. Pointing at the vendored tree keeps the build reproducible
# regardless of host install state.
#
# `[env]` in `.cargo/config.toml` is global (no per-target syntax), so we set
# the path for Madison's primary platform (Apple Silicon) as the workspace
# default. CI workflows for other targets must override LEAPSDK_LIB_PATH
# explicitly (e.g., `LEAPSDK_LIB_PATH=vendor/leapc/linux-x86_64` for Linux
# runners) — there's no way to express per-target env vars in this file.
[env]
LEAPSDK_LIB_PATH = { value = "vendor/leapc/macos-aarch64", relative = true, force = false }

# Per-target rpath / RUNPATH so the linked binary finds libLeapC at runtime
# without DYLD_LIBRARY_PATH / LD_LIBRARY_PATH. Windows uses a different
# mechanism (DLL must be next to the .exe at runtime) — see
# `crates/waveconductor/build.rs` for the copy step.
#
# Two vendor-path entries per platform because binaries land at different
# depths under `target/`:
# - `target/<profile>/<bin>`           — main binary; two `..` to repo root.
# - `target/<profile>/examples/<bin>`  — examples;    three `..` to repo root.
# dyld / ld searches all rpaths in order until one resolves, so listing both
# covers both layouts without per-binary configuration. Release bundles
# ship the dylib at `@executable_path/../lib` (covered by the entries above).
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,@executable_path/../lib",
    "-C", "link-arg=-Wl,-rpath,@loader_path",
    "-C", "link-arg=-Wl,-rpath,@executable_path/../../vendor/leapc/macos-aarch64",
    "-C", "link-arg=-Wl,-rpath,@executable_path/../../../vendor/leapc/macos-aarch64",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,@executable_path/../lib",
    "-C", "link-arg=-Wl,-rpath,@loader_path",
    "-C", "link-arg=-Wl,-rpath,@executable_path/../../vendor/leapc/macos-x86_64",
    "-C", "link-arg=-Wl,-rpath,@executable_path/../../../vendor/leapc/macos-x86_64",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,$ORIGIN/../lib",
    "-C", "link-arg=-Wl,-rpath,$ORIGIN",
    "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../vendor/leapc/linux-x86_64",
    "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../vendor/leapc/linux-x86_64",
]

# Statically link the MSVC C runtime so the shipped exe needs no external
# "VC++ 2015-2022 Redistributable" install. Makes BOTH the portable zip and the
# MSI self-contained (a zip cannot carry an installer's redist merge module).
#
# Our static-CRT exe loads onnxruntime.dll / DirectML.dll / LeapC.dll, which use
# the dynamic CRT. Safe because these are C-ABI libraries with opaque handles and
# caller-owned buffers, so no CRT-owned resource (heap allocation, FILE*) crosses
# the boundary. If ORT ever regresses this, drop crt-static and add Microsoft's
# VC++ redist merge module to the WiX source (MSI-only) instead.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
