# Visual-capture scenarios for `cargo xtask capture`. See tests/visual/CLAUDE.md.
#
# Each [scenarios.<name>] is a deterministic launch. Baselines live under
# tests/visual/baselines/<name>/. `config = "clean"` means a fresh temp config
# dir (no stale on-disk settings); a path value pins WAVECONDUCTOR_CONFIG_DIR.

[scenarios.line-synthetic]
sketch = "line"
provider = "synthetic"
config = "clean"
frames = [30, 60, 120, 240]
dt = 0.016666667

[scenarios.line-synthetic-no-bloom]
sketch = "line"
provider = "synthetic"
config = "clean"
frames = [30, 60, 120, 240]
dt = 0.016666667

[scenarios.line-synthetic-no-bloom.debug]
DISABLE_BLOOM = "1"

# ── Line screensaver / attract mode ─────────────────────────────────────────
# Forces the app into SketchActivity::Screensaver at startup (FORCE_SCREENSAVER)
# so the attract visual is captured deterministically. provider = "mock" (silent,
# no synthetic hand): the motion comes from the sketch's own "Wandering Pulses"
# choreography (three slow Lissajous walkers pulsing 1.2 s of gentle attraction
# once per 14 / 19 / 23.5 s) plus a gentle divergence-free noise turbulence that
# slowly morphs the calm field — the screensaver's primary motion. (An earlier
# composition also had fast "meteor" attractors; they were cut for jolting the
# gravity smear too hard.) Frame indices sample a spread of the pulse schedule +
# the steadily-building turbulence drift (dt = 1/60; walker 0's first pulse spans
# t = 4.0–5.2 s; attract-mode lifetime respawns begin at t = 10 s, the shortest
# seeded lifespan):
#   180 (t= 3.0)  early field, post fade-in — gentle turbulence ripple only
#   276 (t= 4.6)  walker 0 pulse peak (envelope = 1.0)
#   495 (t= 8.25) between pulses — turbulence drift
#   570 (t= 9.5)  between pulses — turbulence drift building
#   666 (t=11.1)  between pulses — more developed drift
#   780 (t=13.0)  later drift, first respawns healing home
#  1320 (t=22.0)  steady-state morph + lifetime respawns fading back in
#  1770 (t=29.5)  late frame: respawn self-heal + drift, line still readable
#
# ONE scenario, not three-per-tier: under the "Low-Rate Ember" Hot model the
# thermal tier changes only the present *rate* (winit UpdateMode wait), which the
# capture harness deliberately ignores (it pins its own virtual clock). The
# choreography and rendered pipeline are tier-agnostic, so all tiers produce the
# SAME captured frames — a per-tier scenario would assert three identical
# baselines. Hot's cooldown (≈3 fps) and the Leap idle-pause are verified by soak
# telemetry + a frame-timing assertion, not by a baseline PNG.
#
# BASELINES ARE PENDING RE-SEED: the PNGs previously committed here were for
# frames {0000, 0270, 0540, 0810} — a set that predates the frame spread above
# ({180, 276, 495, 570, 666, 780, 1320, 1770}) and shared zero indices with it,
# so every capture reported NEW (review) against baselines that could never
# match. They were deleted as dead weight (T10). No baseline PNGs are
# committed for this scenario right now; the first capture will honestly
# report NEW (review) until re-seeded on deployment-class hardware with:
#   cargo xtask capture line-screensaver --update-baselines
# then commit the resulting baselines/line-screensaver/ PNGs. See
# tests/visual/CLAUDE.md for the full baseline workflow.

[scenarios.line-screensaver]
sketch = "line"
provider = "mock"
config = "clean"
frames = [180, 276, 495, 570, 666, 780, 1320, 1770]
dt = 0.016666667

[scenarios.line-screensaver.debug]
FORCE_SCREENSAVER = "1"

# ── Dots (Fabric) — active mode ──────────────────────────────────────────────
# Captures the fabric particle grid in active mode (mouse/hand available via the
# synthetic provider). provider = "synthetic" emits a stationary open hand so
# bone-wireframe visuals are deterministic without hardware.
#
# BASELINES ARE COMMITTED: `tests/visual/baselines/dots-synthetic/` holds the
# operator-seeded `frame_{0030,0060,0120,0240}.png` (seeded post-D7, then
# frame_0030 was repaired after it was caught as an unrendered black frame —
# see the black-frame trap in tests/visual/CLAUDE.md). Re-seed only on the
# deployment-class machine after visual confirmation:
#   cargo xtask capture dots-synthetic --update-baselines
# then commit the resulting baselines/<name>/ PNGs. See tests/visual/CLAUDE.md
# for the full baseline workflow and the "deployment-class machine" requirement.

[scenarios.dots-synthetic]
sketch = "dots"
provider = "synthetic"
config = "clean"
frames = [30, 60, 120, 240]
dt = 0.016666667

# ── Dots (Fabric) screensaver / attract mode ─────────────────────────────────
# Forces the app into SketchActivity::Screensaver at startup (FORCE_SCREENSAVER)
# so the attract visual is captured deterministically. provider = "mock" (silent,
# no synthetic hand): Dots' screensaver has no wandering-pulse choreography — the
# sole motion is a curl-noise turbulence that slowly morphs the idle grid, plus
# fraction-kill (60% of particles survive) and lifetime-respawn self-heal (each
# surviving particle returns to its home position on a staggered 10-18 s lifespan,
# seeded by wang_hash). stationary_constant = 0.01 runs in attract mode, so
# original_xy eases along the turbulence flow — respawns heal to a slowly drifting
# home rather than the literal spawn grid (soak-watch item in PARITY.md).
#
# Frame indices sample the turbulence build-up + the respawn cycle
# (dt = 1/60; shortest seeded lifespan ~10 s; fraction-kill fires at entry):
#    60 (t= 1.0)  early field: fraction-kill applied, turbulence barely started
#   180 (t= 3.0)  post-settle: turbulence developing, surviving particles drifting
#   360 (t= 6.0)  turbulence visibly morphing the grid
#   600 (t=10.0)  first respawn boundary: shortest-lived particles begin returning
#   900 (t=15.0)  mid-respawn cycle: turbulence established, self-heal in progress
#  1320 (t=22.0)  steady-state: respawn self-heal + turbulence drift, fabric readable
#  1800 (t=30.0)  late frame: fully developed morph + stationary-drift visible
#
# ONE scenario covers all thermal tiers (tier only changes present rate; the
# virtual-clock capture harness pins its own dt and ignores winit UpdateMode).
#
# BASELINES ARE NOT YET COMMITTED for this scenario (unlike dots-synthetic
# above): there is no `tests/visual/baselines/dots-screensaver/` directory.
# First capture will honestly report NEW (review) until seeded on the
# deployment-class machine after visual confirmation:
#   cargo xtask capture dots-screensaver --update-baselines
# then commit the resulting baselines/dots-screensaver/ PNGs. See
# tests/visual/CLAUDE.md for the full baseline workflow.

[scenarios.dots-screensaver]
sketch = "dots"
provider = "mock"
config = "clean"
frames = [60, 180, 360, 600, 900, 1320, 1800]
dt = 0.016666667

[scenarios.dots-screensaver.debug]
FORCE_SCREENSAVER = "1"

# ── Cymatics — active mode (the ported v4 wave sketch) ───────────────────────
# Captures the wave-simulation field in active mode. provider = "synthetic"
# emits a stationary open hand (deterministic). At rest (no mouse/grab; those are
# C9/C10) the only excitation is the idle low-radius ambient ripple from the
# centre source (simulate.wgsl injects 2*sin(time) at the default centre), so the
# field is a small animating concentric ripple in the v4 palette — NOT black
# (black => rgba32float WRITE-ONLY storage / pipeline-compile failure) and NOT
# frozen (delta_prev ~ 0 => a ping-pong continuity problem; default iterations=20
# is even). Frame spread samples the ripple over time.
#
# BASELINES ARE OPERATOR-SEEDED (deferred to C15, which also adds the
# -interacting / -screensaver scenarios + AgX palette tuning). No baseline PNGs
# committed yet — first capture reports NEW (review). See tests/visual/CLAUDE.md.

[scenarios.cymatics-synthetic]
sketch = "cymatics"
provider = "synthetic"
config = "clean"
frames = [30, 60, 120, 240]
dt = 0.016666667

# ── Cymatics — interacting mode ──────────────────────────────────────────────
# Captures the wave field with continuous interaction: FORCE_CYMATICS_INTERACTION
# forces the primary centre held at UV (0.5, 0.5) throughout, so active_radius
# grows from the resting floor (0.1 → snapped 0.5 → lerping toward 7.5 at 1%/frame)
# deterministically without hardware or a real mouse press. Frame spread:
#   60  (t= 1.0)  early growth: active_radius ≈ 3.7 — mask starting to open
#  120  (t= 2.0)  mid-growth:   active_radius ≈ 5.4 — field visibly broader
#  240  (t= 4.0)  late growth:  active_radius ≈ 6.9 — near-full mask
#  480  (t= 8.0)  settled:      active_radius ≈ 7.4 — close to target 7.5
#
# BASELINES ARE OPERATOR-SEEDED: no baseline PNGs are committed from the build
# session (headless display; all captures render black). After visual confirmation
# on the deployment machine seed them with:
#   cargo xtask capture cymatics-interacting --update-baselines
# then commit the resulting baselines/cymatics-interacting/ PNGs.

[scenarios.cymatics-interacting]
sketch = "cymatics"
provider = "synthetic"
config = "clean"
frames = [60, 120, 240, 480]
dt = 0.016666667

[scenarios.cymatics-interacting.debug]
FORCE_CYMATICS_INTERACTION = "1"

# ── Cymatics — screensaver / attract mode ────────────────────────────────────
# Forces the app into SketchActivity::Screensaver at startup (FORCE_SCREENSAVER)
# so the attract visual is captured deterministically. provider = "mock" (silent,
# no synthetic hand): motion comes from the sketch's Lissajous wander (two centres
# drifting on slow incommensurate paths, ωx1=0.043/ωy1=0.031, ωx2=0.037/ωy2=0.029,
# amplitude 0.3 around 0.5, active_radius=0.6, periods 146-217s). The field is a
# gently evolving concentric ripple pattern sourced from two slowly sweeping
# positions — visually different from the static idle (cymatics-synthetic) which
# has a single centre. Frame spread:
#  180  (t= 3.0)  early attract: Lissajous paths just started to diverge
#  360  (t= 6.0)  centres moving: two-source interference beginning
#  600  (t=10.0)  mid-wander:    interference pattern evolving
# 1200  (t=20.0)  developed:     fully evolved dual-source field
#
# BASELINES ARE OPERATOR-SEEDED: same constraint as above. Seed with:
#   cargo xtask capture cymatics-screensaver --update-baselines

[scenarios.cymatics-screensaver]
sketch = "cymatics"
provider = "mock"
config = "clean"
frames = [180, 360, 600, 1200]
dt = 0.016666667

[scenarios.cymatics-screensaver.debug]
FORCE_SCREENSAVER = "1"

# Flame, idle morph: default name ("who are you?"), pinned virtual clock, the
# cX oscillation + autorotate are the only motion. Early frames catch the
# bloom-in from the zero seed; 240 is the settled fractal.
[scenarios.flame-synthetic]
sketch = "flame"
provider = "synthetic"
config = "clean"
frames = [30, 60, 120, 240]
dt = 0.016666667

# Flame, warped attractor: WC_DEBUG_FORCE_FLAME_WARP pins the pointer warp to
# (0.35, -0.2), deterministically deforming the shape without hardware.
[scenarios.flame-warp]
sketch = "flame"
provider = "synthetic"
config = "clean"
frames = [60, 120, 240, 480]
dt = 0.016666667

[scenarios.flame-warp.debug]
FORCE_FLAME_WARP = "1"

# Flame attract mode: ember decay + brightness lift + ghost label. The
# carousel period (120 s) exceeds the capture span, so the seed stays the
# default name — deterministic. Wide frame spread across the fade ramp.
[scenarios.flame-screensaver]
sketch = "flame"
provider = "mock"
config = "clean"
frames = [180, 360, 600, 1200]
dt = 0.016666667

[scenarios.flame-screensaver.debug]
